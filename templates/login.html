<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | SafeMeds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 login-bg"></body>

<div class="card shadow p-4" style="width: 400px;">
    <h3 class="text-center mb-4 text-primary">SafeMeds Login</h3>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-center mt-3">
        Don't have an account?
        <a href="{{ url_for('register') }}">Register</a>
    </p>
</div>
<style>

.login-bg{
background-image: url("{{ url_for('static', filename='images/image5.jpeg') }}");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
background-attachment: fixed;
}

</style>
</body>
</html>
